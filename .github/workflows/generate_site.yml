on:
  workflow_dispatch:
  repository_dispatch:
    types: [release_event]

name: Build and deploy website

concurrency:
  group: build-site
  cancel-in-progress: true

# Deny all by default; each job below grants only the scopes it needs.
permissions: {}

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      old_hash: ${{ steps.live_hash.outputs.old_hash }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
      - run: npm ci
      - name: Download combined data
        uses: clusterflick/release-downloader@v3
        with:
          token: ${{ secrets.PAT }}
          repository: "clusterflick/data-combined"
          latest: true
          fileName: "*"
          out-file-path: "combined-data"
      - name: Download matched data
        uses: clusterflick/release-downloader@v3
        with:
          token: ${{ secrets.PAT }}
          repository: "clusterflick/data-matched"
          latest: true
          fileName: "*"
          out-file-path: "matched-data"
      - run: npm run process-combined-data
      - run: npm run generate-summary
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - name: Get current live hash
        id: live_hash
        run: |
          OLD_HASH=$(curl -sf --retry 2 https://clusterflick.com/ | grep -oP '<!DOCTYPE html><!--\K.+?(?=-->)' || echo "")
          echo "old_hash=$OLD_HASH" >> $GITHUB_OUTPUT
          echo "Current live hash: ${OLD_HASH:-<none>}"
      - run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    name: Deploy site
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  verify-hash:
    name: Verify deployment hash
    runs-on: ubuntu-latest
    permissions: {}
    needs: [build, deploy]
    steps:
      - name: Poll for hash change
        env:
          OLD_HASH: ${{ needs.build.outputs.old_hash }}
        run: |
          if [ -z "$OLD_HASH" ]; then
            echo "No pre-deployment hash available, skipping hash check"
            exit 0
          fi
          echo "Polling for hash change (previous: $OLD_HASH)"
          for i in $(seq 1 30); do
            echo "Attempt $i/30..."
            LIVE_HASH=$(curl -sf https://clusterflick.com/ | grep -oP '<!DOCTYPE html><!--\K.+?(?=-->)' || echo "")
            if [ -n "$LIVE_HASH" ] && [ "$LIVE_HASH" != "$OLD_HASH" ]; then
              echo "Hash changed on attempt $i: $OLD_HASH → $LIVE_HASH. Deployment verified."
              exit 0
            fi
            echo "  Found: '${LIVE_HASH:-<none>}' (unchanged)"
            sleep 10
          done
          echo "Deployment hash check failed after 30 attempts"
          exit 1

  indexnow:
    name: Notify IndexNow
    runs-on: ubuntu-latest
    permissions: {}
    needs: verify-hash
    steps:
      - name: Submit changed index pages to IndexNow
        env:
          INDEXNOW_KEY: 7c20decee9cd497aa4328f06a339998c
        run: |
          # Notify IndexNow (Bing, Yandex, etc.) that the daily-changing index
          # pages have updated so they recrawl sooner. Only the high-value index
          # pages are submitted, not the full sitemap — IndexNow expects changed
          # URLs, and blasting every movie/venue URL each deploy invites throttling.
          RESPONSE=$(curl -sS -w '\n%{http_code}' -X POST 'https://api.indexnow.org/indexnow' \
            -H 'Content-Type: application/json; charset=utf-8' \
            -d @- <<JSON
          {
            "host": "clusterflick.com",
            "key": "${INDEXNOW_KEY}",
            "keyLocation": "https://clusterflick.com/${INDEXNOW_KEY}.txt",
            "urlList": [
              "https://clusterflick.com/",
              "https://clusterflick.com/films",
              "https://clusterflick.com/festivals",
              "https://clusterflick.com/film-clubs",
              "https://clusterflick.com/cinema-groups",
              "https://clusterflick.com/genres",
              "https://clusterflick.com/formats",
              "https://clusterflick.com/venues",
              "https://clusterflick.com/london-cinemas"
            ]
          }
          JSON
          )
          STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "IndexNow response ($STATUS): ${BODY:-<empty>}"
          # 200 = accepted, 202 = accepted (validation pending). Anything else is a failure.
          case "$STATUS" in
            200|202) echo "IndexNow submission accepted." ;;
            *) echo "IndexNow submission failed with status $STATUS"; exit 1 ;;
          esac

  smoke-tests:
    name: Run smoke tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: verify-hash
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Run smoke tests
        run: npm run smoke-test
      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: smoke-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
